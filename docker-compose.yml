services:
  digev-fe:
    image: ${DOCKER_IMAGE}
    container_name: digev-fe
    ports:
      - "5173:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    environment:
      - NODE_ENV=production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "30"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
