name: Next.js CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Image’i hem latest hem commit ID ile tagle
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/digitalevin-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/digitalevin-fe:${GITHUB_SHA::7}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/digitalevin-fe
            COMMIT_ID=${GITHUB_SHA::7}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitalevin-fe:latest
            # delete old container if exists
            docker stop digev-fe || true
            docker rm digev-fe || true

            # run new container with restricted cpu and memory
            docker run -d --name digev-fe -p 5173:3000 \
              --cpus="0.5" --memory="512m" \
              -e NODE_ENV=production \
              ${{ secrets.DOCKERHUB_USERNAME }}/digitalevin-fe:${COMMIT_ID}

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Cleanup Old Containers and Images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Deletes all stopped containers
            docker container prune -f
            # Deletes all stopped images
            docker image prune -af